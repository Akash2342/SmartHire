spring.application.name=naukri

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/naukri
spring.datasource.username=naukri_user
spring.datasource.password=naukri_pass

# ─── JPA ─────────────────────────────────────────────────────────────────────
# Hibernate auto-creates/updates tables from entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.access-token.expiration-ms=900000
jwt.refresh-token.expiration-days=7

# ─── File Upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
storage.provider=local
storage.local.base-path=./uploads

# ─── Email (replace with your Mailtrap credentials) ──────────────────────────
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@naukri.com

# ─── App ─────────────────────────────────────────────────────────────────────
server.port=8082
app.base-url=http://localhost:8082
